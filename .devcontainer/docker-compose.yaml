services:
  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../..:/workspaces:cached
    networks:
      - db-network
      - emulate-network
    command: sleep infinity
    environment:
      DATABASE_URL: postgresql://postgres:mysecretpassword@db:5432/postgres
      BETTER_AUTH_SECRET: abcdefghijklmnopqrstuvwxyz123456789
      BETTER_AUTH_ALLOWED_HOSTS: '["localhost:*", "127.0.0.1:*"]'
      GOOGLE_CLIENT_ID: my-client-id.apps.googleusercontent.com
      GOOGLE_CLIENT_SECRET: GOCSPX-secret
      GOOGLE_AUTHORIZATION_ENDPOINT: http://localhost:4000/o/oauth2/v2/auth
      GOOGLE_TOKEN_ENDPOINT: http://emulate:4000/oauth2/token
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:17
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - db-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-t", "10"]
      interval: 1s
      timeout: 10s
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mysecretpassword}
  emulate:
    build:
      context: ../
      dockerfile: ./apps/emulate/Dockerfile
    ports:
      - 4000:4000
    networks:
      - emulate-network

networks:
  db-network:
  emulate-network:

volumes:
  db-data:
